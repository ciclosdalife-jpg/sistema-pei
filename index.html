<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema PEI - Redirecionando...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      flex-direction: column;
      gap: 20px;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid #334155;
      border-top-color: #38bdf8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 1.4rem; color: #38bdf8; }
    p  { font-size: 0.9rem; color: #94a3b8; }
    .erro { color: #f87171; font-size: 0.9rem; text-align: center; max-width: 320px; }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <h1>Sistema PEI</h1>
  <p id="msg">Buscando servidor...</p>

  <script>
    const BIN_ID = '8zeOcmXiU6';

    async function redirecionar() {
      try {
        const res = await fetch(`https://jsonbin-zeta.vercel.app/api/bins/${BIN_ID}`);
        if (!res.ok) throw new Error('Falha ao buscar URL');
        const data = await res.json();
        const url  = data.data.url;
        if (!url || !url.startsWith('https://')) throw new Error('URL inválida');
        document.getElementById('msg').textContent = 'Conectando ao servidor...';
        window.location.href = url;
      } catch (err) {
        document.querySelector('.spinner').style.display = 'none';
        document.getElementById('msg').textContent = '';
        document.body.insertAdjacentHTML('beforeend',
          `<p class="erro">Servidor offline ou URL não atualizada.<br><br>Erro: ${err.message}</p>`
        );
      }
    }
    redirecionar();
  </script>
</body>
</html>
